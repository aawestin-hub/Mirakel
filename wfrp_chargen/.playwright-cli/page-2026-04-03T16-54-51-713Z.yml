          - generic [ref=e126]:
            - paragraph [ref=e127]:
              - text: The Dwarven Troll Slayer is an illustration of the strange personal psychology that dooms many young
              - link "Dwarfs" [ref=e128] [cursor=pointer]:
                - /url: /web/20250217014342/https://wfrp1e.fandom.com/wiki/Dwarf
              - text: to short and violent lives. Young Dwarfs who have been disgraced, crossed in love, or otherwise humiliated will abandon conventional Dwarven society and go to seek death, hunting down the most ferocious of beasts. Most of them die fairly quickly, but those few who survive become members of the strange cult of Troll
              - link "Slayers" [ref=e129] [cursor=pointer]:
                - /url: /web/20250217014342/https://wfrp1e.fandom.com/wiki/Slayers
              - text: . Troll Slayers exist only to die and, by doing so, redeem whatever disgrace they suffered in the past (and into which it is neither polite nor wise to enquire). They seek death by deliberately seeking uneven battles - going alone into
              - link "Goblin" [ref=e130] [cursor=pointer]:
                - /url: /web/20250217014342/https://wfrp1e.fandom.com/wiki/Goblin
              - text: strongholds is one example. Trolls are considered the ideal opponents, because the Dwarf's death is almost a certainty. Troll Slayers can be recognised easily by their hair, which is spiked and dyed orange, and by the many tattoos which cover their bodies. They also favour exotic jewellery, such as earrings and nose plugs. They spend a great deal of their time boasting of their exploits and showing off their many scars and often indulge in bouts of overeating, fasting, and excessive consumption of stimulants.
