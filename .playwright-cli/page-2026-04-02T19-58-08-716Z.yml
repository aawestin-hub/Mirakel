          - generic [ref=e152]:
            - paragraph [ref=e153]: Many Rogues have no special skills or inclinations, but indulge their larcenous tendencies as the opportunity presents itself. The simplest way to make money in the Old World is to take it from somebody else. Thieves are opportunists, ready to turn their hands to anything - they may even consider legitimate employment from time to time, although many regard employment with distaste.
            - paragraph [ref=e154]: Although nearly every Thief is a jack-of-all-trades, there are those who specialise in certain types of crime.
            - paragraph [ref=e155]: Burglars specialise in entering and robbing houses, mainly at night. They are adept at spotting the tell-tale signs that show a house is not occupied and are skilled in dealing with locks, alarms, and other security devices.
            - paragraph [ref=e156]: Clippers are petty crooks who earn their living by tampering with coinage. Old World coins are irregularly-shaped things, whose value is determined by the weight of metal they contain; the stamp of the issuing government on both sides of a coin is a guarantee of its weight and consequently of its value. The Clipper exploits this by clipping or shaving a small amount of metal off the coin. By doing this to ten or twenty coins, the clipper can recover enough metal to make a new coin. One trick, which requires considerable expertise, is to saw a coin in half from edge to edge to give two coins which can be passed to the unwary.
            - paragraph [ref=e157]: Embezzlers are highly-skilled Rogues who work, undetected, for an individual or organisation, syphoning off money through various methods. They place themselves in positions of trust and then help themselves to the monetary wealth of their clients.
            - paragraph [ref=e158]: Fishers are Thieves that specialise in stealing goods through broken or open windows and similar small openings by using a hooked pole. This method attracts less attention than breaking and entering and a Fisher has less chance of getting caught than a burglar who is detected inside an unfamiliar building - all he has to do is drop his pole and run. Fishing is called 'curbing' in Thieves' Tongue, but this term is not known to the law-abiding.
            - paragraph [ref=e159]:
              - text: Pickpockets are specialised Thieves whose forte is stealing valuables from pockets and purses. The Pickpocket is a regular curse in cities and, on crowded market days, there can be any number of individuals or teams operating through the crowds. Cash, of course, is the favourite, the most common technique being to cut the purse from the victim's belt with a small, sharp knife or straight razor. Jewellery has a high value, but is too often difficult to steal unnoticed and can be easily traceable - which makes it difficult to dispose of without the help of a reliable
              - link "Fence" [ref=e160] [cursor=pointer]:
                - /url: /web/20250122154810/https://wfrp1e.fandom.com/wiki/Fence
              - text: ", who will probably rob the Thief even more than the Thief has just robbed the true owner..."
