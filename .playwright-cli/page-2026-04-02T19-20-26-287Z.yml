          - generic [ref=e152]:
            - paragraph [ref=e153]: The Mercenary fights for money, the spoils of war, and the taste of blood. All Mercenaries dream of untold riches; for most of them, the reality consists of an early death and an unmarked grave. Mercenaries roam the Old World, from one war to another - inevitably someone will hire their swords to settle a grievance. Rich Nobles, Merchants, and others take on Mercenaries to bring an argument to a swift conclusion; the Old World kingdoms generate enough conflict to keep many thousands of Mercenaries fully employed. Eventually, however, the wiser ones realise that there is no crock of gold for the hired fighter, and so they turn to adventuring for variety or in search of greater rewards.
